name: Build Android APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 120 # Increased because cryptography takes a long time to compile
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 1. Free Space FIRST to avoid download crashes
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 2. Install Rust (Required for cryptography library)
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libffi-dev libssl-dev \
            libjpeg-dev libpng-dev \
            automake

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install "buildozer>=1.5.0" "cython<3.0" # Cython 0.29.x is safer for older recipes
      
      # We skip the manual sdkmanager license step because Buildozer 
      # handles it via 'android.accept_sdk_license = True' in your spec.

      - name: Build APK with Buildozer
        run: |
          # We use "yes |" to auto-accept any prompts during the build
          yes | buildozer -v android debug
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: simplesideband-apk
          path: bin/*.apk
          retention-days: 30
      
      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}