name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            openjdk-17-jdk \
            python3-pip python3-setuptools python3-wheel \
            build-essential autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libffi-dev libssl-dev \
            libjpeg-dev libpng-dev libbz2-dev \
            wget curl unzip git

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer==1.5.0 cython==0.29.37
          pip install urllib3 requests --upgrade

      - name: Download Android NDK r25b
        run: |
          NDK_DIR="$HOME/.buildozer/android/platform/android-ndk-r25b"
          mkdir -p "$HOME/.buildozer/android/platform"
          echo "Downloading NDK r25b..."
          wget -q --show-progress --tries=3 --timeout=300 \
            -O /tmp/ndk.zip \
            "https://dl.google.com/android/repository/android-ndk-r25b-linux.zip"
          SIZE=$(stat -c%s /tmp/ndk.zip)
          echo "Downloaded: $SIZE bytes"
          if [ "$SIZE" -lt 100000000 ]; then
            echo "ERROR: NDK download too small"
            exit 1
          fi
          unzip -q /tmp/ndk.zip -d "$HOME/.buildozer/android/platform"
          rm /tmp/ndk.zip
          echo "NDK ready: $(ls $NDK_DIR | head -3)"

      - name: Install Android SDK and sdkmanager
        run: |
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK_DIR/cmdline-tools"

          echo "Downloading Android command-line tools..."
          wget -q --tries=3 --timeout=120 \
            -O /tmp/cmdline-tools.zip \
            "https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip"

          unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools-extracted
          rm /tmp/cmdline-tools.zip

          # Google packages cmdline-tools inside a 'cmdline-tools' subfolder;
          # sdkmanager requires it to be at cmdline-tools/latest/
          mv /tmp/cmdline-tools-extracted/cmdline-tools "$SDK_DIR/cmdline-tools/latest"

          SDKMANAGER="$SDK_DIR/cmdline-tools/latest/bin/sdkmanager"
          echo "sdkmanager path: $SDKMANAGER"
          "$SDKMANAGER" --version

          # Accept licenses and install required SDK components
          yes | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true
          "$SDKMANAGER" \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2"

          # Buildozer looks for sdkmanager at tools/bin/sdkmanager — create compat symlink
          mkdir -p "$SDK_DIR/tools/bin"
          ln -sf "$SDKMANAGER" "$SDK_DIR/tools/bin/sdkmanager"
          echo "Symlink created: $SDK_DIR/tools/bin/sdkmanager"

      - name: Pre-seed Android SDK licenses
        run: |
          mkdir -p ~/.android
          echo "count=0" > ~/.android/repositories.cfg
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK_DIR/licenses"
          printf "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n" \
            > "$SDK_DIR/licenses/android-sdk-license"

      - name: Restore Buildozer packages cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.buildozer/android/packages
          key: ${{ runner.os }}-buildozer-packages-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-packages-

      - name: Build APK
        run: buildozer -v android debug
        env:
          BUILDOZER_DEBUG: 1
          PYTHONUNBUFFERED: 1

      - name: Save Buildozer packages cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: ~/.buildozer/android/packages
          key: ${{ runner.os }}-buildozer-packages-${{ hashFiles('buildozer.spec') }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-apk
          path: bin/*.apk
          retention-days: 30

      - name: Upload logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs
          path: |
            .buildozer/logs/
            *.log
          retention-days: 7
