name: Build Android APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    
    # REQUIRED: Grants the GITHUB_TOKEN permissions to create the release
    permissions:
      contents: write 
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android # This frees ~10GB of old SDKs
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libffi-dev libssl-dev \
            libjpeg-dev libpng-dev automake

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install "buildozer>=1.5.0" "cython<3.0"

      # THIS STEP FIXES THE DOWNLOAD ERROR
      - name: Manual NDK Download
        run: |
          mkdir -p ~/.buildozer/android/platform
          echo "Downloading NDK..."
          curl -L https://dl.google.com/android/repository/android-ndk-r25b-linux.zip -o ndk.zip
          echo "Unzipping NDK..."
          unzip -q ndk.zip -d ~/.buildozer/android/platform/
          # REMOVED the 'mv' command so the folder remains 'android-ndk-r25b'
          rm ndk.zip

      - name: Build APK with Buildozer
        env:
          # Force Rust/Cargo to use Buildozer's NDK instead of the GitHub Runner's NDK 27
          ANDROID_NDK_HOME: /home/runner/.buildozer/android/platform/android-ndk-r25b
          ANDROID_NDK_ROOT: /home/runner/.buildozer/android/platform/android-ndk-r25b
        run: |
          # Removed 'yes |' to prevent Broken pipe errors and reveal true logs if it fails
          buildozer -v android debug

      - name: Build APK with Buildozer
        run: |
          # Use 'yes' to handle any prompts (like SDK licenses)
          yes | buildozer -v android debug
          
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: simplesideband-apk
          path: bin/*.apk
          retention-days: 30
      
      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}