      - name: Setup Android SDK & Fix SDK Manager
        run: |
          # 1. Define paths
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK_DIR/cmdline-tools"

          # 2. Download modern Command Line Tools
          wget -q -O /tmp/cmdline-tools.zip "https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip"
          unzip -q /tmp/cmdline-tools.zip -d /tmp/ct
          
          # 3. Buildozer/p4a expects the tools in a specific structure
          mv /tmp/ct/cmdline-tools "$SDK_DIR/cmdline-tools/latest"
          
          # 4. CRITICAL FIX: Create a symlink so Buildozer finds it in the legacy 'tools' path
          ln -s "$SDK_DIR/cmdline-tools/latest" "$SDK_DIR/tools"
          
          # 5. Pre-accept licenses
          mkdir -p "$SDK_DIR/licenses"
          echo -e "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451e1f06d25163b11954135e830f0\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > "$SDK_DIR/licenses/android-sdk-license"

      - name: Build APK
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
          # Fix for Rust-based requirements
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android31-clang
        run: |
          # Ensure platform dir exists
          mkdir -p ~/.buildozer/android/platform/
          
          # Force buildozer.spec to use the correct paths
          sed -i "s|^#\? \?android.ndk_path =.*|android.ndk_path = ${{ steps.setup-ndk.outputs.ndk-path }}|" buildozer.spec
          sed -i "s|^#\? \?android.sdk_path =.*|android.sdk_path = $HOME/.buildozer/android/platform/android-sdk|" buildozer.spec
          sed -i "s|^android.ndk =.*|android.ndk = 25b|" buildozer.spec

          # Symlink NDK
          if [ ! -d ~/.buildozer/android/platform/android-ndk-r25b ]; then
            ln -sf ${{ steps.setup-ndk.outputs.ndk-path }} ~/.buildozer/android/platform/android-ndk-r25b
          fi

          # Run build (using --auto-accept-sdk-license for Buildozer 1.5.0+)
          buildozer -v android debug