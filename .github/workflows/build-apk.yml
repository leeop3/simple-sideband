name: Build Android APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            openjdk-17-jdk \
            python3-pip python3-setuptools python3-wheel \
            build-essential autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libffi-dev libssl-dev \
            libjpeg-dev libpng-dev libbz2-dev \
            wget curl unzip git

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer==1.5.0 cython==0.29.37
          pip install urllib3 requests --upgrade

      - name: Patch Buildozer NDK URL (fix double-r typo)
        # Buildozer 1.5.0 still has a typo: android-ndk-rr25b instead of r25b.
        # Patch the installed source directly so no download is attempted with the bad URL.
        run: |
          ANDROID_PY=$(python -c "import buildozer.targets.android as m; print(m.__file__)")
          echo "Patching: $ANDROID_PY"
          # Show the bad line so we can confirm it exists
          grep -n "rr25b\|ndk.*linux\.zip" "$ANDROID_PY" || echo "Pattern not found - may already be fixed"
          # Replace the double-r URL
          sed -i 's|android-ndk-rr25b-linux\.zip|android-ndk-r25b-linux.zip|g' "$ANDROID_PY"
          sed -i 's|android-ndk-rr25b|android-ndk-r25b|g' "$ANDROID_PY"
          echo "Patch applied. Verifying:"
          grep -n "r25b" "$ANDROID_PY"

      - name: Pre-download Android NDK r25b
        # Download the NDK directly into the exact path Buildozer expects,
        # so it detects it as already present and skips its own download entirely.
        run: |
          mkdir -p ~/.buildozer/android/platform
          cd ~/.buildozer/android/platform

          NDK_ZIP="android-ndk-r25b-linux.zip"
          NDK_DIR="android-ndk-r25b"

          if [ -d "$NDK_DIR" ]; then
            echo "NDK directory already exists, skipping download."
          else
            echo "Downloading Android NDK r25b..."
            wget -q --show-progress --tries=3 --timeout=120 \
              -O "$NDK_ZIP" \
              "https://dl.google.com/android/repository/android-ndk-r25b-linux.zip"

            FILE_SIZE=$(stat -c%s "$NDK_ZIP")
            echo "Downloaded ${FILE_SIZE} bytes"
            if [ "$FILE_SIZE" -lt 100000000 ]; then
              echo "ERROR: Download appears incomplete (< 100MB)"
              exit 1
            fi

            echo "Extracting NDK..."
            unzip -q "$NDK_ZIP"
            rm "$NDK_ZIP"
            echo "NDK extracted to: $(pwd)/$NDK_DIR"
          fi

      - name: Cache Buildozer platform directory
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android/platform/android-sdk
            ~/.buildozer/android/platform/android-ndk-r25b
            ~/.buildozer/android/platform/apache-ant-1.9.4
          key: ${{ runner.os }}-buildozer-platform-v2
          restore-keys: |
            ${{ runner.os }}-buildozer-platform-

      - name: Cache Buildozer packages
        uses: actions/cache@v4
        with:
          path: ~/.buildozer/android/packages
          key: ${{ runner.os }}-buildozer-packages-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-packages-

      - name: Accept Android licenses
        run: |
          mkdir -p ~/.android
          echo "count=0" > ~/.android/repositories.cfg
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          printf "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n" \
            > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license

      - name: Build APK
        run: buildozer -v android debug
        env:
          BUILDOZER_DEBUG: 1
          PYTHONUNBUFFERED: 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-apk
          path: bin/*.apk
          retention-days: 30

      - name: Upload logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs
          path: |
            .buildozer/logs/
            *.log
          retention-days: 7
