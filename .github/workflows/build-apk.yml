name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libffi-dev libssl-dev \
            libjpeg-dev libpng-dev libbz2-dev \
            wget curl unzip git

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install "buildozer>=1.5.0" "cython<3.0"

      - name: Setup Android NDK r25b
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25b

      - name: Buildozer Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            !~/.buildozer/android/platform/build-*
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Pre-accept SDK Licenses
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-arm-dpts-license

      - name: Build APK
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
          # Linker fix for Rust-based requirements
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android31-clang
        run: |
          # 1. Create the platform directory
          mkdir -p ~/.buildozer/android/platform/
          
          # 2. Fix the "rr25b" error by forcing the NDK path in buildozer.spec
          # This ensures Buildozer uses the NDK we downloaded and skips the download attempt.
          sed -i "s|^#\? \?android.ndk_path =.*|android.ndk_path = ${{ steps.setup-ndk.outputs.ndk-path }}|" buildozer.spec
          
          # 3. Ensure the NDK version in spec doesn't have the 'r' prefix if Buildozer is acting up
          sed -i "s|^android.ndk =.*|android.ndk = 25b|" buildozer.spec

          # 4. Symlink as a backup so Buildozer definitely finds it
          if [ ! -d ~/.buildozer/android/platform/android-ndk-r25b ]; then
            ln -s ${{ steps.setup-ndk.outputs.ndk-path }} ~/.buildozer/android/platform/android-ndk-r25b
          fi

          # 5. Run build
          yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: bin/*.apk
          retention-days: 30

      - name: Upload logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs
          path: |
            .buildozer/logs/
            *.log
          retention-days: 7