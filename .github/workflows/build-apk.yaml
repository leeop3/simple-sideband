name: Build Android APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip python3-setuptools python3-wheel \
            build-essential autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libffi-dev libssl-dev \
            libjpeg-dev libpng-dev libbz2-dev \
            wget curl unzip git
      
      - name: Upgrade Buildozer
        run: |
          pip install --upgrade pip setuptools wheel
          pip install --upgrade buildozer cython==0.29.36
          pip install urllib3 requests --upgrade
      
      - name: Cache Android SDK/NDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android/platform/android-sdk
            ~/.buildozer/android/platform/android-ndk
            ~/.buildozer/android/platform/apache-ant
          key: ${{ runner.os }}-android-sdk-ndk-v5
          restore-keys: |
            ${{ runner.os }}-android-sdk-ndk-
      
      - name: Pre-download Android NDK (FIXED)
        run: |
          mkdir -p ~/.buildozer/android/platform/android-ndk
          cd ~/.buildozer/android/platform/android-ndk
          
          # ✅ CORRECT URL (single 'r', not 'rr')
          NDK_URL="https://dl.google.com/android/repository/android-ndk-r25b-linux.zip"
          NDK_FILE="android-ndk-r25b-linux.zip"
          NDK_FOLDER="android-ndk-r25b"
          
          if [ -f "$NDK_FILE" ] && [ $(stat -c%s "$NDK_FILE" 2>/dev/null) -gt 100000000 ]; then
            echo "✅ NDK already downloaded"
          else
            echo "🔄 Downloading Android NDK r25b..."
            # Use wget with proper retry and headers for Google
            wget --no-verbose --tries=5 --waitretry=10 --timeout=60 \
              --user-agent="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36" \
              -O "$NDK_FILE" "$NDK_URL"
            
            FILE_SIZE=$(stat -c%s "$NDK_FILE" 2>/dev/null || echo 0)
            echo "Downloaded: $FILE_SIZE bytes"
            
            if [ "$FILE_SIZE" -lt 100000000 ]; then
              echo "❌ Download failed"
              exit 1
            fi
          fi
          
          if [ ! -d "$NDK_FOLDER" ]; then
            echo "📦 Extracting..."
            unzip -q "$NDK_FILE"
          fi
          echo "✅ NDK ready"
      
      - name: Accept Android licenses
        run: |
          mkdir -p ~/.android
          echo "count=0" > ~/.android/repositories.cfg
          yes | sdkmanager --licenses 2>/dev/null || true
      
      - name: Build APK
        run: |
          export P4A_RELEASE_ANDROID_NDK=r25b
          export DOWNLOAD_TIMEOUT=300
          rm -rf .buildozer/android/platform/build*/build/ 2>/dev/null || true
          buildozer -v android debug
        env:
          BUILDODEZER_DEBUG: 1
          PYTHONUNBUFFERED: 1
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: simplesideband-apk
          path: bin/*.apk
          retention-days: 30
      
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            .buildozer/logs/
            bin/*.log
          retention-days: 7