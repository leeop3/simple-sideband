name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            openjdk-17-jdk \
            python3-pip python3-setuptools python3-wheel \
            build-essential autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libffi-dev libssl-dev \
            libjpeg-dev libpng-dev libbz2-dev \
            wget curl unzip git

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer==1.5.0 cython==0.29.37
          pip install urllib3 requests --upgrade

      # Download NDK FIRST — before any cache restore that might overwrite it
      - name: Download Android NDK r25b
        run: |
          NDK_DIR="$HOME/.buildozer/android/platform/android-ndk-r25b"
          mkdir -p "$HOME/.buildozer/android/platform"
          echo "Downloading NDK r25b..."
          wget -q --show-progress --tries=3 --timeout=300 \
            -O /tmp/ndk.zip \
            "https://dl.google.com/android/repository/android-ndk-r25b-linux.zip"
          SIZE=$(stat -c%s /tmp/ndk.zip)
          echo "Downloaded: $SIZE bytes"
          if [ "$SIZE" -lt 100000000 ]; then
            echo "ERROR: NDK download too small"
            exit 1
          fi
          unzip -q /tmp/ndk.zip -d "$HOME/.buildozer/android/platform"
          rm /tmp/ndk.zip
          echo "NDK extracted to: $NDK_DIR"
          ls "$NDK_DIR" | head -5

      # Tell buildozer.spec where the NDK lives via env var so it never tries to download
      - name: Set NDK path in buildozer.spec
        run: |
          NDK_DIR="$HOME/.buildozer/android/platform/android-ndk-r25b"
          # Inject android.ndk_path if not already present
          if grep -q "^android.ndk_path" buildozer.spec; then
            sed -i "s|^android.ndk_path.*|android.ndk_path = $NDK_DIR|" buildozer.spec
          else
            echo "android.ndk_path = $NDK_DIR" >> buildozer.spec
          fi
          echo "buildozer.spec ndk_path line:"
          grep "ndk" buildozer.spec

      - name: Restore Buildozer platform cache (SDK + ANT only)
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.buildozer/android/platform/android-sdk
            ~/.buildozer/android/platform/apache-ant-1.9.4
          key: ${{ runner.os }}-buildozer-sdk-ant-v1
          restore-keys: |
            ${{ runner.os }}-buildozer-sdk-ant-

      - name: Restore Buildozer packages cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.buildozer/android/packages
          key: ${{ runner.os }}-buildozer-packages-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-packages-

      - name: Pre-seed Android SDK licenses
        run: |
          mkdir -p ~/.android
          echo "count=0" > ~/.android/repositories.cfg
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          printf "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n" \
            > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license

      - name: Build APK
        run: buildozer -v android debug
        env:
          BUILDOZER_DEBUG: 1
          PYTHONUNBUFFERED: 1

      - name: Save Buildozer platform cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            ~/.buildozer/android/platform/android-sdk
            ~/.buildozer/android/platform/apache-ant-1.9.4
          key: ${{ runner.os }}-buildozer-sdk-ant-v1

      - name: Save Buildozer packages cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: ~/.buildozer/android/packages
          key: ${{ runner.os }}-buildozer-packages-${{ hashFiles('buildozer.spec') }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-apk
          path: bin/*.apk
          retention-days: 30

      - name: Upload logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs
          path: |
            .buildozer/logs/
            *.log
          retention-days: 7
