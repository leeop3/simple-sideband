name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libffi-dev libssl-dev \
            libjpeg-dev libpng-dev libbz2-dev \
            wget curl unzip git

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install "buildozer>=1.5.0" "cython<3.0"

      # ✅ NEW: Use a dedicated NDK action (Faster & cleaner than manual wget)
      - name: Setup Android NDK r25b
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25b

      # ✅ IMPROVED CACHING: Cache the entire .buildozer folder (except the large 'app' build artifacts)
      # This preserves the SDK, NDK, and compiled recipes between runs.
      - name: Buildozer Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            !~/.buildozer/android/platform/build-*
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      # ✅ BUILD: Use environment variables instead of 'sed' injection
      - name: Build APK
        env:
          # Use the Java home provided by the setup-java action
          JAVA_HOME: ${{ env.JAVA_HOME }}
          # Tell Buildozer exactly where the NDK and SDK are
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
          # Linker fix for Rust-based requirements (like cryptography)
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android31-clang
        run: |
          # Create the directory structure Buildozer expects
          mkdir -p ~/.buildozer/android/platform/
          
          # Symlink the NDK so Buildozer doesn't try to download its own
          if [ ! -d ~/.buildozer/android/platform/android-ndk-r25b ]; then
            ln -s ${{ steps.setup-ndk.outputs.ndk-path }} ~/.buildozer/android/platform/android-ndk-r25b
          fi

          # Build
          yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: bin/*.apk
          retention-days: 30

      - name: Upload logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs
          path: |
            .buildozer/logs/
            *.log
          retention-days: 7